<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrast Resolution Line Pairs</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f2f2f2;font-family:Arial,sans-serif;}
.widget{width:min(820px,94vw);background:#fff;padding:22px;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.15);}
canvas{width:100%;height:auto;display:block;border:1px solid #ccc;background:#eee;}
.controls{margin-top:18px;display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center;}
input{width:100%;}
</style>
</head>
<body>
<div class="widget">
<canvas id="canvas" width="1000" height="380"></canvas>
<div class="controls">
<label for="resolution">Resolution</label><input id="resolution" type="range" min="0" max="100" value="0">
<label for="contrast">Contrast</label><input id="contrast" type="range" min="0" max="100" value="0">
</div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const resolutionSlider=document.getElementById('resolution');
const contrastSlider=document.getElementById('contrast');

function drawBase(c){
  const bg=235;
  const loss=Number(contrastSlider.value)/100;
  const gray=Math.round(loss*190);
  c.fillStyle='rgb('+bg+','+bg+','+bg+')';
  c.fillRect(0,0,1000,380);
  c.fillStyle='rgb('+gray+','+gray+','+gray+')';
  const y=70,h=240;
  const groups=[
    {x:70,bar:36,gap:42,count:3},
    {x:300,bar:28,gap:30,count:4},
    {x:530,bar:18,gap:18,count:5},
    {x:740,bar:10,gap:9,count:8}
  ];
  for(const g of groups){
    let x=g.x;
    for(let i=0;i<g.count;i++){
      c.fillRect(x,y,g.bar,h);
      x+=g.bar+g.gap;
    }
  }
}

function blurCanvas(source,radius){
  if(radius<=0)return source;
  const w=source.width,h=source.height;
  const sctx=source.getContext('2d');
  const img=sctx.getImageData(0,0,w,h);
  const src=img.data;
  const tmp=new Uint8ClampedArray(src.length);
  const out=new Uint8ClampedArray(src.length);

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let r=0,g=0,b=0,a=0,n=0;
      for(let dx=-radius;dx<=radius;dx++){
        const xx=Math.min(w-1,Math.max(0,x+dx));
        const idx=(y*w+xx)*4;
        r+=src[idx];g+=src[idx+1];b+=src[idx+2];a+=src[idx+3];n++;
      }
      const idx=(y*w+x)*4;
      tmp[idx]=r/n;tmp[idx+1]=g/n;tmp[idx+2]=b/n;tmp[idx+3]=a/n;
    }
  }

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let r=0,g=0,b=0,a=0,n=0;
      for(let dy=-radius;dy<=radius;dy++){
        const yy=Math.min(h-1,Math.max(0,y+dy));
        const idx=(yy*w+x)*4;
        r+=tmp[idx];g+=tmp[idx+1];b+=tmp[idx+2];a+=tmp[idx+3];n++;
      }
      const idx=(y*w+x)*4;
      out[idx]=r/n;out[idx+1]=g/n;out[idx+2]=b/n;out[idx+3]=a/n;
    }
  }

  const result=document.createElement('canvas');
  result.width=w;result.height=h;
  result.getContext('2d').putImageData(new ImageData(out,w,h),0,0);
  return result;
}

function draw(){
  const off=document.createElement('canvas');
  off.width=1000;off.height=380;
  drawBase(off.getContext('2d'));
  const blurRadius=Math.round((Number(resolutionSlider.value)/100)*18);
  const output=blurCanvas(off,blurRadius);
  ctx.clearRect(0,0,1000,380);
  ctx.drawImage(output,0,0);
}

resolutionSlider.addEventListener('input',draw);
contrastSlider.addEventListener('input',draw);
draw();
</script>
</body>
</html>
